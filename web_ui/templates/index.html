<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Tutor - Interactive Puzzle Solver</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>♔ Chess Tutor</h1>
            <p>Interactive Puzzle Solver</p>
        </header>

        <!-- Main Content -->
        <div class="content">
            <!-- Left Panel: Board -->
            <div class="board-panel">
                <div class="puzzle-info">
                    <h2 id="puzzleName">Loading...</h2>
                    <p id="puzzleDescription">Please wait...</p>
                    <div class="puzzle-metadata">
                        <span class="difficulty" id="difficultyBadge">--</span>
                        <span class="puzzle-number" id="puzzleNumber">Puzzle -- / --</span>
                    </div>
                </div>

                <!-- Chess Board -->
                <div class="board-container">
                    <div id="chessboard" class="chessboard">
                        <!-- Board squares generated by JavaScript -->
                    </div>
                </div>

                <!-- Move Input -->
                <div class="move-input-section">
                    <input 
                        type="text" 
                        id="moveInput" 
                        class="move-input" 
                        placeholder="Enter move (e.g. e2e4)" 
                        maxlength="5"
                    >
                    <button id="submitBtn" class="btn btn-primary">Play Move</button>
                </div>

                <!-- Feedback -->
                <div id="feedback" class="feedback"></div>

                <!-- Move History -->
                <div class="move-history">
                    <h4>Moves:</h4>
                    <div id="moveList" class="move-list">
                        <span class="empty-moves">No moves yet</span>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Controls & Info -->
            <div class="control-panel">
                <!-- Progress -->
                <div class="progress-section">
                    <h3>Progress</h3>
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                    <p id="progressText">0 / 8 solved</p>
                </div>

                <!-- Actions -->
                <div class="actions-section">
                    <h3>Actions</h3>
                    <button id="hintsBtn" class="btn btn-secondary">💡 Get Hints</button>
                    <button id="undoBtn" class="btn btn-secondary">↶ Undo Last</button>
                    <button id="resetBtn" class="btn btn-secondary">🔄 Reset Board</button>
                </div>

                <!-- Hints Display -->
                <div id="hintsPanel" class="hints-panel" style="display: none;">
                    <h3>💡 Suggested Moves</h3>
                    <div id="hintsList" class="hints-list">
                        <!-- Hints populated by JS -->
                    </div>
                </div>

                <!-- Legal Moves Display -->
                <div class="legal-moves-section">
                    <h3>📍 Legal Moves</h3>
                    <div id="legalMovesList" class="legal-moves-list">
                        <!-- Legal moves populated by JS -->
                    </div>
                </div>

                <!-- Navigation -->
                <div class="navigation-section">
                    <h3>Navigate</h3>
                    <button id="prevBtn" class="btn btn-nav">← Previous</button>
                    <button id="nextBtn" class="btn btn-nav">Next →</button>
                </div>

                <!-- Puzzle List -->
                <div class="puzzle-list-section">
                    <h3>🎯 All Puzzles</h3>
                    <div id="puzzlesList" class="puzzles-list">
                        <!-- Puzzle list populated by JS -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Chess Tutor Web UI • Press Enter to submit move • Type moves in UCI notation (e.g., e2e4)</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='board.js') }}"></script>
</body>
</html>
